<svg width="680" height="280" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
  <rect width="680" height="280" fill="white"/>

  <!-- Arc: right to left, gentle baby draw ball flight -->
  <path d="M 417 133 Q 348.5 110, 250 134" fill="none" stroke="#1B4332" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Flag pole at left end -->
  <line x1="250" y1="134" x2="250" y2="119" stroke="#1B4332" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Flag triangle pointing right -->
  <polygon points="250,119 250,126 257,122.5" fill="#1B4332"/>

  <!-- Main wordmark: BABYDRAW -->
  <text x="340" y="174" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="41" font-weight="300" letter-spacing="2" fill="#1B4332">BABYDRAW</text>

  <!-- GOLF subtitle -->
  <text x="340" y="201" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="15" font-weight="300" letter-spacing="11" fill="#1B4332">GOLF</text>
</svg>